name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          # github user name to read the contribution graph from (**required**)
          # using action context var `github.repository_owner` or specified user
          github_user_name: raiksha
      
          # list of files to generate.
          # one file per line. Each output can be customized with options as query string.
          #
          #  supported options:
          #  - palette:           A preset of color, one of [github, github-dark, github-light]
          #  - color_snake:       Color of the snake
          #  - color_dots:        Coma separated list of dots color.
          #                       The first one is 0 contribution, then it goes from the low contribution to the highest.
          #                       Exactly 5 colors are expected.
          #  - color_background:  Color of the background (for gif only)
          outputs: |
            dist/github-snake.svg?color_snake=E8B298&color_dots=#ebedf0,#D4A29C,#E8B298,#A26360,#7a4a48
            dist/github-snake-dark.svg?palette=github-dark&color_snake=E8B298&color_dots=#1a1a2e,#BDD1C5,#9DAAA2,#A26360,#7a4a48
            
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

